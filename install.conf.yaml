- defaults:
    link:
      relink: true
      create: true
    brewfile:
      stdout: true
      stderr: true
      include: ['tap', 'brew', 'cask', 'mas']

- create:
  - ~/.config
  - ~/.claude
  - ~/.codex
  - ~/.agents
  - ~/.agents/instructions

- link:
    ~/:
      glob: true
      path: home/*
      prefix: '.'
    ~/.config/:
      glob: true
      path: config/*
    ~/.claude/:
      glob: true
      path: claude/*
    ~/.codex/AGENTS.md:
      path: codex/AGENTS.md
    ~/.codex/config.toml:
      path: codex/config.toml
    ~/.agents/instructions/:
      glob: true
      path: ai/instructions/*
    ~/.cursor/commands:
      path: ai/commands
    ~/.claude/commands:
      path: ai/commands
    ~/.remarkrc.json:
      path: tools/remark/remarkrc.json
    ~/.local/bin/remark:
      path: scripts/remark

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [brew bundle --file=Brewfile, Installing Homebrew packages]
  - [./scripts/install-remark, Installing remark toolchain]
  - ["git config filter.eliza-url.clean 'sd -s \"$ELIZA_API_HOST\" \"ELIZA_API_HOST\" -f -' && git config filter.eliza-url.smudge 'sd -s \"ELIZA_API_HOST\" \"$ELIZA_API_HOST\" -f -'", Configuring git clean/smudge filter for internal URLs]
