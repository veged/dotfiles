- defaults:
    link:
      relink: true
      create: true
    brewfile:
      stdout: true
      stderr: true
      include: ['tap', 'brew', 'cask', 'mas']

- create:
  - ~/.config
  - ~/.config/opencode
  - ~/.claude
  - ~/.claude/skills
  - ~/.codex
  - ~/.cursor
  - ~/.agents
  - ~/.agents/instructions
  - ~/.agents/skills
  - ~/.agents/plugins
  - ~/.codex/plugins
  - ~/.config/fabric

- link:
    ~/:
      glob: true
      path: home/*
      prefix: '.'
    ~/.config/:
      glob: true
      path: config/*
      exclude: [config/opencode]
    ~/.config/opencode/:
      glob: true
      path: config/opencode/*
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
    ~/.codex/AGENTS.md:
      path: codex/AGENTS.md
    ~/.agents/instructions/:
      glob: true
      path: ai/instructions/*.md
    ~/.remarkrc.json:
      path: tools/remark/remarkrc.json
    ~/.local/bin/remark:
      path: scripts/remark
    ~/.local/bin/openspec:
      path: scripts/openspec
    ~/.config/fabric/codex-bridge.mjs:
      path: fabric/codex-bridge.mjs
    ~/.config/fabric/README.md:
      path: fabric/README.md
    ~/.local/bin/fabric:
      path: scripts/fabric

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [./scripts/personal check, Checking personal variables]
  - [brew bundle --file=Brewfile, Installing Homebrew packages]
  - [./scripts/install-skills, Syncing AI skills]
  - [./scripts/install-plugins, Installing local Codex plugins]
  - [./scripts/install-mcp, Syncing MCP runtimes and generated configs]
  - [./scripts/install-remark, Installing remark toolchain]
  - [./scripts/install-openspec, Installing OpenSpec toolchain]
  - [./scripts/install-fabric, Configuring Fabric → Codex bridge]
  - [./scripts/personal configure-git-filter, Configuring git clean/smudge filter for internal URLs]
